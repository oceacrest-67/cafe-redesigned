<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Brew & Byte — Our Menu</title>
    
    <!-- SEO & Metadata -->
    <meta name="description" content="Explore the gourmet menu at Brew & Byte. From premium blends to refreshing sips.">
    <meta property="og:title" content="Our Menu | Brew & Byte">
    <meta property="og:description" content="Discover tasty bites and coastal vibes. Checkout our full menu.">
    <meta property="og:image" content="../assets/images/pics/Logo.png">
    <meta property="og:url" content="./">
    <meta property="og:type" content="website">
    
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600&family=Playfair+Display:ital,wght@0,400;0,600;700&display=swap" rel="stylesheet">
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Styles -->
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Header / Nav -->
    <header id="header">
        <div class="container header-inner">
            <div class="header-top">
                <a href="../index.html" class="back-btn" aria-label="Back to home">
                    <i class="fa-solid fa-chevron-left"></i>
                </a>
                <div class="brand-center">
                    <span class="sub-logo">Brew & Byte</span>
                    <h1 class="main-logo">MENU</h1>
                </div>
                <div class="placeholder-icon"></div>
            </div>
            
            <!-- Search & Filter Area -->
            <div class="search-container">
                <div class="search-bar">
                    <i class="fa-solid fa-magnifying-glass search-icon"></i>
                    <input type="text" id="search-input" placeholder="Search for flavors..." autocomplete="off">
                    <button id="clear-search" class="clear-btn" aria-label="Clear search">
                        <i class="fa-solid fa-xmark"></i>
                    </button>
                </div>
            </div>
            
            <!-- Category Scroll -->
            <nav id="category-nav" class="category-scroll" role="tablist">
                <!-- Categories injected here by JS -->
            </nav>
        </div>
    </header>

    <main class="menu-main">
        <div class="container">
            <div id="results-meta" class="results-meta"></div>
            
            <!-- Menu Grid -->
            <div id="menu-grid" class="menu-grid">
                <!-- Skeleton cards or items injected here -->
            </div>
            
            <!-- Empty State -->
            <div id="empty-state" class="empty-state" style="display: none;">
                <div class="empty-icon">🍽️</div>
                <h3>No dishes found</h3>
                <p>Try searching for something else or explore another category.</p>
            </div>
        </div>
    </main>

    <!-- Item Detail Modal -->
    <div id="item-modal" class="modal-overlay" role="dialog" aria-modal="true">
        <div class="modal-content">
            <div class="modal-handle-bar"></div>
            <div class="modal-header">
                <button id="close-modal" class="close-modal-btn" aria-label="Close">
                    <i class="fa-solid fa-xmark"></i>
                </button>
                <div id="modal-img-container" class="modal-img-container">
                    <!-- Image injected here -->
                </div>
            </div>
            <div class="modal-body">
                <div class="modal-title-row">
                    <h2 id="modal-item-name"></h2>
                    <div id="modal-item-type" class="item-type-badge"></div>
                </div>
                <p id="modal-item-desc" class="modal-item-description"></p>
                <div class="modal-footer">
                    <div class="price-wrap">
                        <span class="price-label">Price</span>
                        <span id="modal-item-price" class="item-price"></span>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
